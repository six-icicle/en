<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    en — app icon, V3 torii (faithful to in-app navbar mark).
    Kanagawa bg (#1f1f28) + Everforest sage stroke (#a7c080), 60px stroke weight.
    Coordinates lifted from the in-app SVG (44×44 viewBox) and scaled by 1024/44.
    Plate corners: 22.37% radius (Apple's standard squircle approximation as a true circle radius).
  -->
  <defs>
    <clipPath id="plate-clip">
      <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229"/>
    </clipPath>
  </defs>
  <g clip-path="url(#plate-clip)">
    <rect x="0" y="0" width="1024" height="1024" fill="#1f1f28"/>
    <g fill="none" stroke="#a7c080" stroke-width="60" stroke-linecap="round">
      <path d="M 116 280 Q 512 186 908 280"/>
      <line x1="256" y1="419" x2="768" y2="419"/>
      <line x1="326" y1="280" x2="326" y2="838"/>
      <line x1="698" y1="280" x2="698" y2="838"/>
    </g>
  </g>
</svg>
