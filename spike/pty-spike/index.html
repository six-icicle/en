<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTY spike — claude in a tile</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<style>
  html, body { height: 100%; margin: 0; background: #1f1f28; color: #dcd7ba;
               font-family: 'JetBrains Mono', ui-monospace, monospace; }
  body { display: flex; flex-direction: column; }
  header { padding: 8px 14px; font-size: 12px; border-bottom: 1px solid #2f3043;
           display: flex; align-items: center; gap: 12px; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #54546d; }
  header .dot.ok { background: #76946a; box-shadow: 0 0 6px #76946a; }
  header .dot.bad { background: #c34043; }
  #term { flex: 1; padding: 10px; min-height: 0; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <span id="status">connecting…</span>
    <span style="margin-left:auto; opacity:0.6;">ws://localhost:9001</span>
  </header>
  <div id="term"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script>
    const term = new Terminal({
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 14,
      theme: {
        background: '#1f1f28',
        foreground: '#dcd7ba',
        cursor:     '#c0a36e',
        black:   '#16161d', red:     '#c34043', green:   '#76946a', yellow:  '#c0a36e',
        blue:    '#7e9cd8', magenta: '#957fb8', cyan:    '#6a9589', white:   '#c8c093',
        brightBlack:   '#727169', brightRed:     '#e82424', brightGreen:   '#98bb6c',
        brightYellow:  '#e6c384', brightBlue:    '#7fb4ca', brightMagenta: '#938aa9',
        brightCyan:    '#7aa89f', brightWhite:   '#dcd7ba',
      },
      cursorBlink: true,
      allowProposedApi: true,
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('term'));
    fit.fit();

    const dot = document.getElementById('dot');
    const status = document.getElementById('status');

    const ws = new WebSocket('ws://localhost:9001');
    ws.binaryType = 'arraybuffer';

    ws.addEventListener('open', () => {
      dot.className = 'dot ok';
      status.textContent = 'connected — claude live';
      sendResize();
    });
    ws.addEventListener('close', () => {
      dot.className = 'dot bad';
      status.textContent = 'disconnected';
    });
    ws.addEventListener('error', () => {
      dot.className = 'dot bad';
      status.textContent = 'error — is `cargo run` running?';
    });

    ws.addEventListener('message', (ev) => {
      if (ev.data instanceof ArrayBuffer) {
        term.write(new Uint8Array(ev.data));
      } else {
        term.write(ev.data);
      }
    });

    term.onData((data) => {
      if (ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    function sendResize() {
      if (ws.readyState !== 1) return;
      ws.send(JSON.stringify({
        type: 'resize',
        cols: term.cols,
        rows: term.rows,
      }));
    }

    window.addEventListener('resize', () => {
      fit.fit();
      sendResize();
    });
  </script>
</body>
</html>
